const firstName=user.name.charAt(0).toUpperCase()+user.name.slice(1);

const filtered=useMemo(()=>{
let list=ALL_TUTORS.filter(t=>{
const s=t.name.toLowerCase().includes(search.toLowerCase())||t.subject.toLowerCase().includes(search.toLowerCase())||t.bio.toLowerCase().includes(search.toLowerCase());
const sub=subject===“All”||t.subject===subject;
const l=lang===“All Languages”||t.language===lang;
const p=price===“Any Price”||(price===“Under $12”&&t.price<12)||(price===”$12–$16”&&t.price>=12&&t.price<=16)||(price===”$17–$20”&&t.price>=17&&t.price<=20)||(price===“Over $20”&&t.price>20);
return s&&sub&&l&&p;
});
if(sort===“Top Rated”) list.sort((a,b)=>b.rating-a.rating);
else if(sort===“Price: Low to High”) list.sort((a,b)=>a.price-b.price);
else if(sort===“Price: High to Low”) list.sort((a,b)=>b.price-a.price);
else list.sort((a,b)=>b.reviews-a.reviews);
return list;
},[search,subject,lang,price,sort]);

function App() {
const [page,setPage]=useState(“login”);
const [user,setUser]=useState(null);
if(page===“login”) return <LoginPage onLogin={u=>{setUser(u);setPage(“dashboard”);}} onGoSignup={()=>setPage(“signup”)}/>;
if(page===“signup”) return <SignupPage onSignup={u=>{setUser(u);setPage(“dashboard”);}} onGoLogin={()=>setPage(“login”)}/>;
return <Dashboard user={user} onLogout={()=>{setUser(null);setPage(“login”);}}/>;
}

ReactDOM.createRoot(document.getElementById(‘root’)).render(<App/>);
