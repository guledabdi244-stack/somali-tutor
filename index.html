function Dashboard({user, onLogout}) {
const [nav,setNav]=useState(“Find Tutors”);

const [price,setPrice]=useState(“Any Price”);
const [sort,setSort]=useState(“Top Rated”);

const first = user.name.charAt(0).toUpperCase()+user.name.slice(1);

const list = useMemo(()=>{
let r = TUTORS.filter(t=>{
const sq = !q || t.name.toLowerCase().includes(q.toLowerCase())||t.subject.toLowerCase().includes(q.toLowerCase())||t.bio.toLowerCase().includes(q.toLowerCase());
const ss = subj===“All”||t.subject===subj;
const sl = lang===“All Languages”||t.language===lang;
const sp = price===“Any Price”||(price===“Under $12”&&t.price<12)||(price===”$12–$16”&&t.price>=12&&t.price<=16)||(price===”$17–$20”&&t.price>=17&&t.price<=20)||(price===“Over $20”&&t.price>20);
return sq&&ss&&sl&&sp;
});
if(sort===“Top Rated”) r.sort((a,b)=>b.rating-a.rating);
else if(sort===“Price: Low to High”) r.sort((a,b)=>a.price-b.price);
else if(sort===“Price: High to Low”) r.sort((a,b)=>b.price-a.price);
else r.sort((a,b)=>b.reviews-a.reviews);
return r;
},[q,subj,lang,price,sort]);

const NAV=[{l:“Dashboard”,i:“🏠”},{l:“Find Tutors”,i:“🔍”},{l:“My Lessons”,i:“📅”},{l:“Messages”,i:“💬”},{l:“Payments”,i:“💳”},{l:“Settings”,i:“⚙️”}];
