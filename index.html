// ─── ROOT APP ────────────────────────────────────────────
function App() {
const [page, setPage] = useState(“login”); // login | signup | dashboard
const [user, setUser] = useState(null);

if (page === “login”) return <LoginPage onLogin={u=>{setUser(u);setPage(“dashboard”);}} onGoSignup={()=>setPage(“signup”)}/>;
if (page === “signup”) return <SignupPage onSignup={u=>{setUser(u);setPage(“dashboard”);}} onGoLogin={()=>setPage(“login”)}/>;
return <Dashboard user={user} onLogout={()=>{setUser(null);setPage(“login”);}}/>;
}

ReactDOM.createRoot(document.getElementById(‘root’)).render(<App/>);
</script>
