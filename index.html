<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SomaliTutor</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
body{
font-family:Arial;
background:#f0f4f8;
margin:0;
}

.container{
display:flex;
height:100vh;
align-items:center;
justify-content:center;
}

.card{
background:white;
padding:30px;
border-radius:10px;
width:300px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.link{
color:#2563eb;
cursor:pointer;
margin-top:10px;
display:block;
text-align:center;
}
</style>

</head>
<body>

<div id="root"></div>

<script type="text/babel">

const {useState} = React;

const tutors = [
{ id:1, name:"Teacher Khadra", subject:"Quran", price:15 },
{ id:2, name:"Teacher Ahmed", subject:"English", price:12 },
{ id:3, name:"Teacher Fadumo", subject:"Math", price:10 },
];

function Login({onLogin,onGoSignup}){

const [email,setEmail]=useState("");
const [password,setPassword]=useState("");

return(

<div className="container">

<div className="card">

<h2>SomaliTutor Login</h2>

<input
placeholder="Email"
value={email}
onChange={e=>setEmail(e.target.value)}
/>

<input
type="password"
placeholder="Password"
value={password}
onChange={e=>setPassword(e.target.value)}
/>

<button onClick={()=>onLogin({name:email.split("@")[0]})}>
Login
</button>

<span className="link" onClick={onGoSignup}>
Create account
</span>

</div>

</div>

)

}

function Signup({onSignup,onGoLogin}){

const [name,setName]=useState("");
const [email,setEmail]=useState("");
const [password,setPassword]=useState("");

return(

<div className="container">

<div className="card">

<h2>Create Account</h2>

<input
placeholder="Full name"
value={name}
onChange={e=>setName(e.target.value)}
/>

<input
placeholder="Email"
value={email}
onChange={e=>setEmail(e.target.value)}
/>

<input
type="password"
placeholder="Password"
value={password}
onChange={e=>setPassword(e.target.value)}
/>

<button onClick={()=>onSignup({name})}>
Sign Up
</button>

<span className="link" onClick={onGoLogin}>
Back to login
</span>

</div>

</div>

)

}

function Dashboard({user,onLogout}){

return(

<div style={{padding:"40px"}}>

<h1>Welcome {user.name}</h1>

<h2>Available Tutors</h2>

{tutors.map(t=>(
<div key={t.id} style={{
background:"white",
padding:"15px",
marginTop:"10px",
borderRadius:"8px"
}}>
<strong>{t.name}</strong>
<br/>
Subject: {t.subject}
<br/>
Price: ${t.price}/hr
</div>
))}

<button style={{marginTop:"30px"}} onClick={onLogout}>
Logout
</button>

</div>

)

}

function App(){

const [page,setPage]=useState("login");
const [user,setUser]=useState(null);

if(page==="login"){
return(
<Login
onLogin={(u)=>{setUser(u);setPage("dashboard")}}
onGoSignup={()=>setPage("signup")}
/>
)
}

if(page==="signup"){
return(
<Signup
onSignup={(u)=>{setUser(u);setPage("dashboard")}}
onGoLogin={()=>setPage("login")}
/>
)
}

return(
<Dashboard
user={user}
onLogout={()=>{setUser(null);setPage("login")}}
/>
)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>
</html>
